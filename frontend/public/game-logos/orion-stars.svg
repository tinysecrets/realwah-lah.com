<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256">
  <defs>
    <radialGradient id="osBg" cx="40%" cy="30%" r="90%">
      <stop offset="0%" stop-color="#6366F1"/>
      <stop offset="55%" stop-color="#312E81"/>
      <stop offset="100%" stop-color="#0B061A"/>
    </radialGradient>
    <radialGradient id="osPulse" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#F0ABFC" stop-opacity=".7"/>
      <stop offset="70%" stop-color="#F0ABFC" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="256" height="256" rx="56" fill="url(#osBg)"/>
  <!-- nebula dust -->
  <circle cx="70" cy="200" r="70" fill="url(#osPulse)"/>
  <!-- stars -->
  <g fill="#ECFEFF">
    <circle cx="42" cy="48" r="1.5"/>
    <circle cx="210" cy="40" r="2"/>
    <circle cx="226" cy="116" r="1.2"/>
    <circle cx="30" cy="140" r="1.4"/>
    <circle cx="196" cy="210" r="1.2"/>
    <circle cx="58" cy="92" r="1"/>
  </g>
  <!-- Orion constellation (simplified) -->
  <g stroke="#FDE68A" stroke-opacity=".6" stroke-width="1" fill="none" stroke-dasharray="2 3">
    <line x1="70" y1="70" x2="110" y2="118"/>
    <line x1="110" y1="118" x2="128" y2="130"/>
    <line x1="128" y1="130" x2="146" y2="142"/>
    <line x1="146" y1="142" x2="190" y2="186"/>
    <line x1="110" y1="118" x2="90" y2="150"/>
    <line x1="146" y1="142" x2="168" y2="108"/>
  </g>
  <!-- constellation nodes -->
  <g fill="#FDE68A">
    <circle cx="70"  cy="70"  r="4.5"/>
    <circle cx="110" cy="118" r="6"/>
    <circle cx="128" cy="130" r="5"/>
    <circle cx="146" cy="142" r="6"/>
    <circle cx="190" cy="186" r="4.5"/>
    <circle cx="90"  cy="150" r="3.5"/>
    <circle cx="168" cy="108" r="3.5"/>
  </g>
  <!-- bright hero star with 4-point flare -->
  <g transform="translate(128 130)">
    <polygon points="0,-46 8,0 46,0 8,8 0,46 -8,8 -46,0 -8,0" fill="#FFFFFF" opacity=".95"/>
    <circle r="10" fill="#FFFFFF"/>
  </g>
</svg>
