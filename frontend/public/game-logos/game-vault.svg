<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256">
  <defs>
    <linearGradient id="gvBg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#78350F"/>
      <stop offset="60%" stop-color="#451A03"/>
      <stop offset="100%" stop-color="#0B061A"/>
    </linearGradient>
    <radialGradient id="gvShine" cx="50%" cy="40%" r="55%">
      <stop offset="0%" stop-color="#FDE68A" stop-opacity=".55"/>
      <stop offset="100%" stop-color="#FDE68A" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="gvGold" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FDE68A"/>
      <stop offset="50%" stop-color="#F59E0B"/>
      <stop offset="100%" stop-color="#B45309"/>
    </linearGradient>
  </defs>
  <rect width="256" height="256" rx="56" fill="url(#gvBg)"/>
  <circle cx="128" cy="118" r="95" fill="url(#gvShine)"/>
  <!-- vault body -->
  <rect x="48" y="52" width="160" height="160" rx="18" fill="#1F1140" stroke="url(#gvGold)" stroke-width="4"/>
  <!-- rivets -->
  <g fill="url(#gvGold)">
    <circle cx="64"  cy="68"  r="4"/>
    <circle cx="192" cy="68"  r="4"/>
    <circle cx="64"  cy="196" r="4"/>
    <circle cx="192" cy="196" r="4"/>
  </g>
  <!-- dial outer ring -->
  <circle cx="128" cy="132" r="52" fill="#0B061A" stroke="url(#gvGold)" stroke-width="5"/>
  <circle cx="128" cy="132" r="40" fill="none" stroke="#F59E0B" stroke-opacity=".45" stroke-width="1"/>
  <!-- dial ticks -->
  <g stroke="url(#gvGold)" stroke-width="3" stroke-linecap="round">
    <line x1="128" y1="84"  x2="128" y2="92"/>
    <line x1="128" y1="172" x2="128" y2="180"/>
    <line x1="80"  y1="132" x2="88"  y2="132"/>
    <line x1="168" y1="132" x2="176" y2="132"/>
  </g>
  <!-- dial handle (sweeping) -->
  <g transform="translate(128 132) rotate(32)">
    <rect x="-4" y="-46" width="8" height="92" rx="4" fill="url(#gvGold)"/>
    <circle cx="0" cy="-46" r="8" fill="url(#gvGold)"/>
    <circle cx="0" cy="46"  r="8" fill="url(#gvGold)"/>
    <circle cx="0" cy="0"   r="10" fill="#0B061A" stroke="url(#gvGold)" stroke-width="3"/>
  </g>
  <!-- V monogram below -->
  <text x="128" y="232" text-anchor="middle" font-family="Georgia, serif" font-size="22" font-weight="bold" fill="url(#gvGold)" letter-spacing="3">VAULT</text>
</svg>
