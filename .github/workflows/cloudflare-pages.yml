name: Deploy to Cloudflare Pages

on:
  push:
    branches:
      - main  # Change this to master if your default branch is master

jobs:
  deploy:
    runs-on: ubuntu-latest
    name: Deploy
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # Add any build steps here if your project requires building before deployment (e.g., npm run build)

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          wranglerVersion: '3'
          command: pages deploy . --project-name=your-project-name
