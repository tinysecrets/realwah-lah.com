# Pre-commit hooks for Sugar City Sweeps
# Install:  pip install pre-commit && pre-commit install
# Run manually:  pre-commit run --all-files
#
# Blocks commits that contain secrets (passwords, API keys, tokens, BTC addrs,
# high-entropy strings). After legitimate new secrets are reviewed, re-baseline
# with:  detect-secrets scan --baseline .secrets.baseline

repos:
  - repo: https://github.com/Yelp/detect-secrets
    rev: v1.5.0
    hooks:
      - id: detect-secrets
        args: ["--baseline", ".secrets.baseline"]
        exclude: |
          (?x)^(
              .*\.lock|
              yarn\.lock|
              package-lock\.json|
              \.secrets\.baseline|
              frontend/build/.*|
              .*\.snap
          )$

  # Quick safety-net hooks
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: check-added-large-files
        args: ["--maxkb=1024"]
      - id: check-merge-conflict
      - id: detect-private-key
      - id: end-of-file-fixer
      - id: trailing-whitespace
        exclude: (\.md|\.snap)$
